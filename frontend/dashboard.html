<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Noty</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dashboard-page">
  <div class="app-shell">
    <div id="sidebarBackdrop" class="sidebar-backdrop" hidden></div>

    <aside id="sidebar" class="sidebar" aria-label="Navegacion de notas">
      <div class="sidebar-header">
        <div>
          <p class="eyebrow">Notas <span id="noteCount" class="note-count"></span></p>
          <h1>Noty</h1>
        </div>
        <div class="header-actions">
          <button id="themeToggleButton" class="icon-button" type="button" aria-label="Cambiar a modo nocturno" title="Cambiar a modo nocturno">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <button id="logoutButton" class="icon-button" type="button" aria-label="Cerrar sesion" title="Cerrar sesion">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span>Salir</span>
          </button>
        </div>
      </div>

      <button id="newNoteButton" class="button primary full-width" type="button">📄 Nueva nota</button>

      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchNotes" type="text" placeholder="Buscar notas..." aria-label="Buscar notas">
      </div>

      <div class="selection-toolbar">
        <button id="selectModeButton" class="button secondary" type="button" title="Elegir varias notas para eliminarlas juntas">☑️ Seleccionar</button>
        <button id="bulkDeleteButton" class="button danger" type="button" hidden>🗑️ Eliminar (<span id="selectedCount">0</span>)</button>
      </div>

      <div id="notesList" class="notes-list" aria-label="Lista de notas"></div>
    </aside>

    <main class="editor-panel">
      <div class="editor-topbar">
        <button id="menuToggleButton" class="icon-button menu-toggle" type="button" aria-label="Abrir menu de notas" aria-expanded="false" aria-controls="sidebar">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" focusable="false"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="title-field">
          <input id="noteTitle" class="title-input" type="text" placeholder="Titulo de la nota" autocomplete="off">
          <input id="noteTagsInput" class="tags-input" type="text" placeholder="Etiquetas separadas por coma (ej: trabajo, urgente)" autocomplete="off">
          <span id="unsavedIndicator" class="unsaved-indicator" hidden>● Cambios sin guardar</span>
        </div>
        <div class="editor-actions">
          <button id="saveNoteButton" class="button primary" type="button" title="Guardar (Ctrl/Cmd + S)" onclick="window.NotyNotes.saveNote()">✏️ Guardar</button>
          <button id="exportPdfButton" class="button secondary" type="button" onclick="window.NotyNotes.exportNoteToPdf()">Exportar PDF</button>
        </div>
      </div>

      <div class="toolbar" aria-label="Barra de formato">
        <fieldset class="toolbar-group">
          <legend>Encabezados</legend>
          <div class="toolbar-group-buttons">
            <button data-command="formatBlock" data-value="h1" type="button" title="Encabezado grande">H1</button>
            <button data-command="formatBlock" data-value="h2" type="button" title="Encabezado mediano">H2</button>
            <button data-command="formatBlock" data-value="h3" type="button" title="Encabezado pequeño">H3</button>
          </div>
        </fieldset>

        <fieldset class="toolbar-group">
          <legend>Estilo</legend>
          <div class="toolbar-group-buttons">
            <button data-command="bold" type="button" title="Negrita">B</button>
            <button data-command="italic" type="button" title="Cursiva">I</button>
          </div>
        </fieldset>

        <fieldset class="toolbar-group">
          <legend>Listas</legend>
          <div class="toolbar-group-buttons">
            <button data-command="insertUnorderedList" type="button" title="Lista con viñetas">Lista</button>
            <button data-command="insertOrderedList" type="button" title="Lista numerada">1. Lista</button>
          </div>
        </fieldset>

        <fieldset class="toolbar-group">
          <legend>Formato</legend>
          <div class="toolbar-group-buttons">
            <button data-command="formatBlock" data-value="p" type="button" title="Párrafo normal">Parrafo</button>
          </div>
        </fieldset>
      </div>

      <section id="noteEditor" class="note-editor is-empty" contenteditable="true" aria-label="Editor de contenido" data-placeholder="Escribe tu nota aqui..."></section>

      <div class="editor-footer">
        <span id="noteStats" class="note-stats">0 palabras · 0 caracteres</span>
        <p id="message" class="message success" role="status">Dashboard v4 cargado.</p>
      </div>
    </main>
  </div>

  <div id="undoToast" class="undo-toast" role="status" hidden>
    <span id="undoToastText"></span>
    <button id="undoButton" class="button secondary" type="button">Deshacer</button>
  </div>

  <script src="js/api.js?v=1"></script>
  <script src="js/notes.js?v=1"></script>
</body>
</html>
