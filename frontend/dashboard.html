<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Noty</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dashboard-page">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div>
          <p class="eyebrow">Notas</p>
          <h1>Noty</h1>
        </div>
        <button id="logoutButton" class="icon-button" type="button" title="Cerrar sesion">🚪 Salir</button>
      </div>

      <button id="newNoteButton" class="button primary full-width" type="button">📄 Nueva nota</button>

      <div class="search-box">
        <input id="searchNotes" type="text" placeholder="Buscar notas..." aria-label="Buscar notas">
      </div>

      <div class="selection-toolbar">
        <button id="selectModeButton" class="button secondary" type="button" title="Elegir varias notas para eliminarlas juntas">☑️ Seleccionar</button>
        <button id="bulkDeleteButton" class="button danger" type="button" hidden>🗑️ Eliminar (<span id="selectedCount">0</span>)</button>
      </div>

      <div id="notesList" class="notes-list" aria-label="Lista de notas"></div>
    </aside>

    <main class="editor-panel">
      <div class="editor-topbar">
        <input id="noteTitle" class="title-input" type="text" placeholder="Titulo de la nota">
        <div class="editor-actions">
          <button id="saveNoteButton" class="button primary" type="button" onclick="window.NotyNotes.saveNote()">✏️ Guardar</button>
          <button id="deleteNoteButton" class="button danger" type="button" onclick="window.NotyNotes.deleteNote()">Eliminar</button>
          <button id="exportPdfButton" class="button secondary" type="button" onclick="window.NotyNotes.exportNoteToPdf()">Exportar PDF</button>
        </div>
      </div>

      <div class="toolbar" aria-label="Barra de formato">
        <button data-command="formatBlock" data-value="h1" type="button" title="Encabezado grande">H1</button>
        <button data-command="formatBlock" data-value="h2" type="button" title="Encabezado mediano">H2</button>
        <button data-command="formatBlock" data-value="h3" type="button" title="Encabezado pequeño">H3</button>
        <button data-command="bold" type="button" title="Negrita">B</button>
        <button data-command="italic" type="button" title="Cursiva">I</button>
        <button data-command="insertUnorderedList" type="button" title="Lista con viñetas">Lista</button>
        <button data-command="insertOrderedList" type="button" title="Lista numerada">1. Lista</button>
        <button data-command="formatBlock" data-value="p" type="button" title="Párrafo normal">Parrafo</button>
      </div>

      <section id="noteEditor" class="note-editor" contenteditable="true" aria-label="Editor de contenido">
        <p>Escribe tu nota aqui...</p>
      </section>

      <p id="message" class="message success" role="status">Dashboard v4 cargado.</p>
    </main>
  </div>

  <script src="js/api.js?v=1"></script>
  <script src="js/notes.js?v=1"></script>
</body>
</html>
